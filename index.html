<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-title" content="RSS">
<meta name="application-name" content="RSS">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>RSS Stable V57.2</title>

<style>
html,body{
  margin:0;
  font-family:-apple-system;
  background:#121212;
  color:#e0e0e0;
  touch-action:manipulation;
  overscroll-behavior-y:contain;
}

/* ====== ヘッダー ====== */
header{
  position:fixed;
  top:0;left:0;right:0;
  z-index:9999;
  background:#1e1e1e;
  padding:6px 8px;
  display:flex;
  gap:6px;
  align-items:center;
  height:48px;
  box-sizing:border-box;
}

#feedSelect{
  flex:1;
  padding:6px;
  background:#2a2a2a;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:14px;
}

#unreadBtn,#favFilterBtn,#manageBtn{
  height:36px;
  padding:0 8px;
  border:none;
  border-radius:8px;
  background:#2a2a2a;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  min-width:36px;
  box-sizing:border-box;
}

#unreadBtn{font-size:14px; font-weight:bold;}
#favFilterBtn{font-size:20px;}
#manageBtn{font-size:24px; min-width:36px;}

#unreadBtn.active{background:#1976d2;}
#favFilterBtn.active{background:#fbc02d;color:#000;}

/* ====== プル更新 ====== */
#loading{
  position:fixed;
  top:48px;left:0;right:0;
  text-align:center;
  height:0;
  overflow:hidden;
  background:#1e1e1e;
  color:#aaa;
  transition:0.2s;
  line-height:40px;
}

/* ====== 一覧 ====== */
#list{
  margin-top:48px;
  padding:8px 10px;
}

.item{
  background:#1e1e1e;
  margin:8px 0;
  padding:12px;
  border-radius:10px;
  position:relative;
  overflow:hidden;
}

.item.read{opacity:0.4;}
.item.favorite{border:1px solid #fbc02d; opacity:1;}

.item::after{
  content:"★";
  position:absolute;
  right:10px;top:50%;
  transform:translateY(-50%);
  color:#fbc02d;
  opacity:0;
  transition:0.2s;
}
.item.swiping-left::after{opacity:1;}

/* ====== viewer ====== */
#viewer{
  position:fixed;
  inset:0;
  background:#121212;
  display:none;
  z-index:10000;
  overflow-y:auto;
}

#content{
  padding:12px;
  padding-bottom:120px; /* 余白調整 */
  box-sizing:border-box;
}

#content img{
  max-width:100%;
  max-height:50vh;
  object-fit:contain;
  border-radius:8px;
  display:block;
  margin:10px auto;
  cursor:zoom-in;
}

/* 抽出本文内の調整 */
#content iframe {
  width:100%;
  border-radius:8px;
  margin:12px 0;
  background:#000;
}
#content p, #content div {
  line-height:1.7;
  margin:12px 0;
  word-break:break-all;
}
#content br {
  display: block;
  content: "";
  margin-top: 6px;
}

/* 全文表示内のすべての要素の文字色を白へ強制統一 */
.full-view-content, 
.full-view-content *, 
.full-view-content [style*="color"] {
  color: #ffffff !important;
  background-color: transparent !important;
}

/* リンクだけは明るい青で上書き強制 */
.full-view-content a, 
.full-view-content a *,
#content a {
  color: #64b5f6 !important;
  text-decoration: underline !important;
}

/* 🔥【改善】サイト表示用iframe：下の隙間を詰め、高さを画面ぴったりに補正 */
.site-display-iframe {
  width: 100%;
  height: calc(100vh - 154px) !important; /* ヘッダー48px + ボトムバー100px + 上下微調整 */
  border: none;
  display: block;
  background: #fff;
  border-radius: 8px;
  margin: 0;
  padding: 0;
}

#bottomBar{
  position:fixed;
  bottom:0;left:0;right:0;
  height:100px;
  background:#1e1e1e;
  display:flex;
  z-index:10005;
}

.btn{
  flex:1;
  margin:6px;
  font-size:16px;
  background:#2a2a2a;
  color:#fff;
  border:none;
  border-radius:12px;
}

.btn-fav{
  flex:0 0 54px;
  max-width:54px;
}

/* ====== 画像モーダル ====== */
#imgModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  z-index:10006;
  align-items:center;
  justify-content:center;
}

#imgModalImg{
  max-width:100%;
  max-height:100%;
  touch-action:none;
  transition:transform 0.05s linear;
}

/* ====== 設定メニュー ====== */
#manager{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:#121212;
  display:none;
  z-index:10007;
  padding:10px;
  overflow-y:auto;
  padding-bottom:350px;
}

#managerClose{
  position:absolute;
  top:8px;right:8px;
  width:32px;height:32px;
  border:none;
  border-radius:8px;
  background:#2a2a2a;
  color:#fff;
  font-size:18px;
}

.manager-section{margin-bottom:16px;}
.manager-section h4{margin:0 0 6px;}

.rssItem{
  background:#1e1e1e;
  padding:6px 8px;
  margin:4px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#excludeList,#highlightList{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.excludeItem{
  background:#1e1e1e;
  padding:6px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#excludeInput,#rssInput,#highlightInput{
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#2a2a2a;
  color:#fff;
  box-sizing:border-box;
  margin-bottom:6px;
}

.grid-2btn {
  display:flex;
  gap:8px;
}
.grid-2btn .btn-action {
  flex:1;
  margin-right:0;
}

.btn-action {
  padding:10px;
  background:#2a2a2a;
  color:#fff;
  border:none;
  border-radius:6px;
  margin-right:6px;
  margin-bottom:6px;
  font-size:14px;
}

.highlight{
  background:#ffeb3b;
  color:#000;
  font-weight:bold;
  padding:2px 4px;
  border-radius:4px;
}
</style>
</head>

<body>

<header>
  <select id="feedSelect" onchange="onFeedChange()">
    <option value="all">全てのサイト</option>
  </select>
  <button id="unreadBtn" onclick="toggleUnread()">未</button>
  <button id="favFilterBtn" onclick="toggleFavoriteFilter()">★</button>
  <button id="manageBtn" onclick="toggleManager()">≡</button>
</header>

<div id="loading">更新</div>
<div id="list"></div>

<div id="viewer">
  <div id="content"></div>
  <div id="bottomBar"></div>
</div>

<div id="imgModal">
  <img id="imgModalImg" src="">
</div>

<div id="manager">
  <button id="managerClose" onclick="toggleManager()">×</button>

  <h3>設定</h3>

  <div class="manager-section">
    <h4>RSSを追加</h4>
    <input id="rssInput" placeholder="RSS URL を入力"
           onkeydown="if(event.key==='Enter'){addRSS()}"
           onfocus="focusInput(this)">
  </div>

  <div class="manager-section">
    <h4>登録済みRSS</h4>
    <div id="rssList"></div>
  </div>

  <div class="manager-section">
    <h4>除外ワード</h4>
    <input id="excludeInput" placeholder="除外ワードを入力"
           onkeydown="if(event.key==='Enter'){addExcludeWord()}"
           onfocus="focusInput(this)">
    <div id="excludeList"></div>
  </div>

  <div class="manager-section">
    <h4>強調ワード</h4>
    <input id="highlightInput" placeholder="強調ワードを入力"
           onkeydown="if(event.key==='Enter'){addHighlightWord()}"
           onfocus="focusInput(this)">
    <div id="highlightList"></div>
  </div>

  <div class="manager-section">
    <h4>設定バックアップ</h4>
    <div class="grid-2btn">
      <button class="btn-action" onclick="exportBackupClipboard()">コピー</button>
      <button class="btn-action" onclick="importBackupClipboard()">ペースト</button>
    </div>
  </div>

  <div class="manager-section">
    <h4>リセット</h4>
    <div class="grid-2btn">
      <button class="btn-action" style="background:#d32f2f;" onclick="resetAllArticlesData()">記事データ</button>
      <button class="btn-action" style="background:#d32f2f;" onclick="resetRead()">既読データ</button>
    </div>
  </div>
</div>

<script>
/* =========================
   状態管理
========================= */
let feeds = [];
let itemsByFeed = [];
let flatItems = [];
let currentView = [];
let currentViewIndex = 0;
let current = null;

let readMap = {};
let excludeWords = [];
let highlightWords = [];

let favorites = {}; 
let favArticles = {}; 

let dbArticles = {};

let favoriteOnly = false;
let currentFeedFilter = "all";
let unreadOnly = false;

let isFullView = false;
let lockScrollY = 0;

function focusInput(el) {
  setTimeout(() => {
    el.scrollIntoView({ behavior: "smooth", block: "center" });
  }, 300);
}

async function fetchWithTimeout(url, timeout=10000){
  return Promise.race([
    fetch(url),
    new Promise((_,reject)=>setTimeout(()=>reject("timeout"),timeout))
  ]);
}

function decodeHtmlEntities(str){
  if(!str) return "";
  const txt = document.createElement("textarea");
  txt.innerHTML = str;
  return txt.value;
}

function getNodeHTML(node){
  const el =
    node.querySelector("content") ||
    node.querySelector("content\\:encoded") ||
    node.getElementsByTagNameNS("*","encoded")[0];

  if(!el) return "";
  return decodeHtmlEntities(el.textContent || "");
}

function extractImages(html){
  if(!html) return [];
  const decoded = decodeHtmlEntities(html);
  const urls = [...decoded.matchAll(/<img[^>]+src=["']([^"']+)["']/gi)]
    .map(m => m[1]);
  return [...new Set(urls)];
}

function stripImages(html){
  if(!html) return "";
  const decoded = decodeHtmlEntities(html);
  return decoded.replace(/<img[^>]*>/gi, "");
}

function getArticleImage(node){
  const serializer = new XMLSerializer();
  const nodeText = serializer.serializeToString(node);

  const urlRegex = /https?:\/\/[^\s"'><`]+(?:jpg|jpeg|png|gif|webp|bmp)[^\s"'><`]*/gi;
  const matches = nodeText.match(urlRegex);

  if (matches) {
    const uniqueUrls = [...new Set(matches)].map(url => decodeHtmlEntities(url).trim());
    for (const url of uniqueUrls) {
      if (!url.includes("avatar") && !url.includes("icon") && !url.includes("logo")) {
        return url;
      }
    }
    if (uniqueUrls.length > 0) return uniqueUrls[0];
  }

  const desc = node.querySelector("description")?.textContent || "";
  const descImgs = extractImages(desc);
  if (descImgs.length > 0) return descImgs[0];

  return "";
}

async function tryFetchImageFromHTML(articleUrl, targetImgId) {
  if (!articleUrl) return;
  try {
    const proxy = "https://corsproxy.io/?" + encodeURIComponent(articleUrl);
    const htmlText = await fetchWithTimeout(proxy, 6000).then(r => r.text());
    
    const urlRegex = /https?:\/\/[^\s"'><`)]+(?:jpg|jpeg|png|gif|webp|bmp)[^\s"'><`)]*/gi;
    const matches = htmlText.match(urlRegex);
    
    if (matches) {
      const uniqueUrls = [...new Set(matches)];
      let foundUrl = "";
      
      const ogImg = uniqueUrls.find(u => u.includes("og-image") || u.includes("ogp") || u.includes("/uploads/") || u.includes("/wp-content/uploads/"));
      if (ogImg) {
        foundUrl = ogImg;
      } else {
        foundUrl = uniqueUrls.find(u => !u.includes("avatar") && !u.includes("icon") && !u.includes("logo") && !u.includes("theme"));
      }

      if (foundUrl) {
        const cleanUrl = decodeHtmlEntities(foundUrl).trim();
        if (current && current.link === articleUrl) {
          current.image = cleanUrl;
        }
        const targetEl = document.getElementById(targetImgId);
        if (targetEl) {
          targetEl.src = cleanUrl;
          targetEl.style.display = "block";
        }
        saveImageToDB(articleUrl, cleanUrl);
      }
    }
  } catch (e) {}
}

function saveImageToDB(link, imgUrl) {
  let updated = false;
  for (let url in dbArticles) {
    dbArticles[url].forEach(item => {
      if (item.link === link && !item.image) {
        item.image = imgUrl;
        updated = true;
      }
    });
  }
  if (updated) {
    localStorage.setItem("dbArticles", JSON.stringify(dbArticles));
  }
}

function makeItemKey(title, link, desc, pub){
  let base = "";
  if(title) base += title.trim();
  if(pub && pub !== 0) {
    base += "|" + pub;
  } else if(link) {
    base += "|" + link.replace(/[^a-zA-Z0-9]/g, "");
  } else {
    base += "|" + desc.slice(0,40).trim();
  }
  return base;
}

function applyHighlight(text){
  if(!text) return "";
  let result = text;
  highlightWords.forEach(w=>{
    if(!w) return;
    const re = new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "gi");
    result = result.replace(re, `<span class="highlight">$&</span>`);
  });
  return result;
}

async function addRSS(){
  const rssUrl = document.getElementById("rssInput").value.trim();
  if(!rssUrl || !rssUrl.startsWith("http")) return;
  if(feeds.some(f => f.url === rssUrl)) return;

  let blogName = rssUrl;
  try{
    const proxy = "https://corsproxy.io/?" + encodeURIComponent(rssUrl);
    const xmlText = await fetch(proxy).then(r=>r.text());
    const xml = new DOMParser().parseFromString(xmlText,"text/xml");
    const titleNode = xml.querySelector("channel > title, feed > title");
    if(titleNode) blogName = titleNode.textContent.trim();
  }catch(e){}

  feeds.push({url:rssUrl,name:blogName});
  localStorage.setItem("feeds", JSON.stringify(feeds));
  document.getElementById("rssInput").value = "";
  buildFeedSelect();
  renderManager();
  load();
}

function editFeedName(i){
  const f = feeds[i];
  const currentName = f.name || f.url;
  const name = prompt("ブログ名を編集", currentName);
  if(name === null) return;
  const trimmed = name.trim();
  if(!trimmed) return;

  feeds[i].name = trimmed;
  localStorage.setItem("feeds", JSON.stringify(feeds));
  buildFeedSelect();
  renderManager();
}

function buildPagedUrls(baseUrl){
  const urls = [baseUrl];
  for (let p = 2; p <= 5; p++) {
    if (baseUrl.includes("/feed")) {
      const separator = baseUrl.includes("?") ? "&" : "?";
      urls.push(`${baseUrl}${separator}paged=${p}`);
    }
    else if (baseUrl.includes("atom.xml") || baseUrl.includes("doorblog.jp") || baseUrl.includes("livedoor")) {
      const separator = baseUrl.includes("?") ? "&" : "?";
      urls.push(`${baseUrl}${separator}p=${p}`);
      urls.push(`${baseUrl}${separator}page=${p}`);
    }
    else if (baseUrl.includes("?xml")) {
      urls.push(`${baseUrl}&p=${p}`);
      urls.push(`${baseUrl}&paged=${p}`);
    }
    else {
      const separator = baseUrl.includes("?") ? "&" : "?";
      urls.push(`${baseUrl}${separator}paged=${p}`);
      urls.push(`${baseUrl}${separator}p=${p}`);
    }
  }
  return [...new Set(urls)];
}

let fetchedTmpItems = [];

function parseRSS(text, feedUrl){
  const xml = new DOMParser().parseFromString(text,"text/xml");
  if(!xml || !xml.documentElement) return;
  const root = xml.documentElement.tagName.toLowerCase();

  const pushItem = (title, desc, link, img, pubMs)=>{
    const key = makeItemKey(title, link, desc, pubMs);
    if(fetchedTmpItems.some(i => i.key === key)) return;
    fetchedTmpItems.push({title,desc,link,image:img,pubDate:pubMs,key,feedUrl});
  };

  if(root==="rss" || xml.querySelector("channel")){
    const items = xml.getElementsByTagName("item");
    for(const node of items){
      const rawDesc = getNodeHTML(node) || node.querySelector("description")?.textContent || "";
      const desc = stripImages(rawDesc);
      const link = node.querySelector("link")?.textContent || "";
      const title = node.querySelector("title")?.textContent || "";
      const img = getArticleImage(node);

      let pubMs = 0;
      const pub = node.querySelector("pubDate")?.textContent;
      if(pub){ const t = Date.parse(pub); if(!isNaN(t)) pubMs = t; }
      pushItem(title, desc, link, img, pubMs);
    }
  } else if(root==="feed" || xml.querySelector("entry")){
    const entries = xml.getElementsByTagName("entry");
    for(const node of entries){
      const title = node.getElementsByTagName("title")[0]?.textContent || "";
      const rawDesc = getNodeHTML(node) || node.getElementsByTagName("summary")[0]?.textContent || node.getElementsByTagName("content")[0]?.textContent || "";
      const desc = stripImages(rawDesc);
      const linkNode = [...node.getElementsByTagName("link")].find(l=>l.getAttribute("rel")==="alternate") || node.getElementsByTagName("link")[0];
      const link = linkNode?.getAttribute("href") || "";
      const img = getArticleImage(node);

      let pubMs = 0;
      const upd = node.getElementsByTagName("updated")[0]?.textContent || node.getElementsByTagName("published")[0]?.textContent;
      if(upd){ const t = Date.parse(upd); if(!isNaN(t)) pubMs = t; }
      pushItem(title, desc, link, img, pubMs);
    }
  } else if(root.includes("rdf")){
    const items = xml.getElementsByTagName("item");
    for(const node of items){
      const rawDesc = getNodeHTML(node) || node.getElementsByTagName("description")[0]?.textContent || "";
      const desc = stripImages(rawDesc);
      const title = node.getElementsByTagName("title")[0]?.textContent || "";
      const link = node.getElementsByTagName("link")[0]?.textContent || "";
      const img = getArticleImage(node);
      pushItem(title, desc, link, img, 0);
    }
  }
}

async function load(){
  fetchedTmpItems = [];
  
  for(let fi=0; fi<feeds.length; fi++){
    const f = feeds[fi];
    const pageUrls = buildPagedUrls(f.url);
    for(const pageUrl of pageUrls){
      try{
        const proxy = "https://corsproxy.io/?" + encodeURIComponent(pageUrl);
        const res = await fetchWithTimeout(proxy,8000);
        const text = await res.text();
        parseRSS(text, f.url);
      }catch(e){}
    }
  }

  feeds.forEach(f => {
    if (!dbArticles[f.url]) dbArticles[f.url] = [];
    const newItems = fetchedTmpItems.filter(it => it.feedUrl === f.url);
    
    newItems.forEach(newItem => {
      const exists = dbArticles[f.url].some(dbItem => dbItem.key === newItem.key);
      if (!exists) {
        dbArticles[f.url].push(newItem);
      } else {
        const match = dbArticles[f.url].find(dbItem => dbItem.key === newItem.key);
        if (match && !match.image && newItem.image) {
          match.image = newItem.image;
        }
      }
    });

    dbArticles[f.url].sort((a,b)=>(b.pubDate||0)-(a.pubDate||0));

    if (dbArticles[f.url].length > 100) {
      dbArticles[f.url] = dbArticles[f.url].slice(0, 100);
    }
  });

  localStorage.setItem("dbArticles", JSON.stringify(dbArticles));

  itemsByFeed = feeds.map(()=>[]);
  flatItems = [];

  for(let fi=0; fi<feeds.length; fi++){
    const f = feeds[fi];
    itemsByFeed[fi] = dbArticles[f.url] || [];
    itemsByFeed[fi].forEach((item, idx) => {
      flatItems.push({feedIndex:fi,indexInFeed:idx,item:item});
    });
  }

  flatItems.sort((a,b)=>(b.item.pubDate||0)-(a.item.pubDate||0));
  
  buildFeedSelect();
  render();
}

function isExcluded(item){
  const t = (item.title||"").toLowerCase();
  const d = (item.desc||"").toLowerCase();
  return excludeWords.some(w=>{
    const s = w.toLowerCase().trim();
    return s && (t.includes(s) || d.includes(s));
  });
}

function updateUnreadCounts() {
  let totalUnread = 0;
  const feedCounts = feeds.map(() => 0);

  flatItems.forEach(ref => {
    const it = ref.item;
    if (isExcluded(it)) return;
    if (!readMap[it.key]) {
      totalUnread++;
      feedCounts[ref.feedIndex]++;
    }
  });

  document.getElementById("unreadBtn").textContent = "未";

  const sel = document.getElementById("feedSelect");
  if (sel.options.length > 0) {
    sel.options[0].textContent = totalUnread > 0 ? `全てのサイト (${totalUnread})` : "全てのサイト";
    feeds.forEach((f, idx) => {
      if (sel.options[idx + 1]) {
        const count = feedCounts[idx];
        sel.options[idx + 1].textContent = count > 0 ? `${f.name || f.url} (${count})` : (f.name || f.url);
      }
    });
  }
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML="";
  currentView=[];
  let source=[];

  if (favoriteOnly) {
    const favItems = [];
    for (let key in favorites) {
      if (favorites[key] && favArticles[key]) {
        favItems.push({ isFromStorageFav: true, item: favArticles[key] });
      }
    }
    favItems.sort((a,b) => (b.item.pubDate || 0) - (a.item.pubDate || 0));
    source = favItems;
  } else {
    if(currentFeedFilter==="all"){
      source=flatItems;
    }else{
      const fi = Number(currentFeedFilter);
      source = (itemsByFeed[fi] || []).map((it,idx)=>({feedIndex:fi,indexInFeed:idx,item:it}));
    }
  }

  source.forEach(ref=>{
    const it = ref.item;
    if(isExcluded(it)) return;

    const key = it.key;
    const isRead = !!readMap[key];
    const isFav = !!favorites[key];

    if(unreadOnly && isRead) return;

    const viewIndex = currentView.length;
    currentView.push(ref);

    const div = document.createElement("div");
    div.className="item";
    if(isRead) div.classList.add("read");
    if(isFav) div.classList.add("favorite");
    div.dataset.key = key;
    div.innerHTML = applyHighlight(it.title || "(無題)");

    addSwipeHandler(div, it);
    div.onclick = ()=>openItem(viewIndex);
    list.appendChild(div);
  });

  updateUnreadCounts();
}

function addSwipeHandler(el, item){
  let startX=0, startY=0, moved=false;
  const key = item.key;

  el.addEventListener("touchstart",e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
  });
  el.addEventListener("touchmove",e=>{
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if(Math.abs(dy) > 30) return;
    if(dx < -40){ el.classList.add("swiping-left"); moved = true; }
  });
  el.addEventListener("touchend",()=>{
    if(moved){
      if (favorites[key]) { favorites[key] = false; delete favArticles[key]; }
      else { favorites[key] = true; favArticles[key] = item; }
      localStorage.setItem("favorites", JSON.stringify(favorites));
      localStorage.setItem("favArticles", JSON.stringify(favArticles));
      render();
    }
    el.classList.remove("swiping-left");
  });
}

function openItem(viewIndex){
  if(viewIndex<0 || viewIndex>=currentView.length) return;
  currentViewIndex=viewIndex;
  const ref = currentView[viewIndex];

  current = ref.isFromStorageFav ? ref.item : itemsByFeed[ref.feedIndex][ref.indexInFeed];

  const key = current.key;
  readMap[key]=true;
  localStorage.setItem("readMap",JSON.stringify(readMap));
  render();

  lockScrollY = window.scrollY || 0;
  document.documentElement.style.overflow = "hidden";
  document.body.style.overflow = "hidden";
  window.scrollTo(0, lockScrollY);

  document.getElementById("viewer").style.display="block";
  renderViewer();
}

window.addEventListener("scroll", ()=>{
  if(document.getElementById("viewer").style.display === "block" && window.scrollY !== lockScrollY){
    window.scrollTo(0, lockScrollY);
  }
});

function renderViewer(){
  isFullView = false;
  const key = current.key;
  const isFav = !!favorites[key];

  const targetImgId = "dynamicViewerImg";
  let imgHtml = "";
  
  if (current.image) {
    imgHtml = `<img id="${targetImgId}" src="${current.image}" onclick="openImgModal('${current.image}')">`;
  } else {
    imgHtml = `<img id="${targetImgId}" src="" style="display:none;" onclick="openImgModal(this.src)">`;
    tryFetchImageFromHTML(current.link, targetImgId);
  }

  const contentEl = document.getElementById("content");

  contentEl.innerHTML = `
    <h3>${applyHighlight(current.title)}</h3>
    ${imgHtml}
    <div class="full-view-content">${applyHighlight(current.desc)}</div>
    <div style="display:flex; gap:8px; margin-top:16px;">
      <button class="btn" onclick="showCleanFull()" style="margin:0; padding:12px 0;">全文表示</button>
      <button class="btn" onclick="showRawSite()" style="margin:0; padding:12px 0;">サイト表示</button>
    </div>
  `;

  document.getElementById("bottomBar").innerHTML = `
    <button class="btn" onclick="closeViewer()">戻る</button>
    <button class="btn-fav btn" onclick="toggleFavoriteCurrent()">${isFav?"★":"☆"}</button>
    <button class="btn" onclick="prevItem()">▲</button>
    <button class="btn" onclick="nextItem()">▼</button>
  `;
  
  fixContentLinks();
}

/* 🔥【改善】全画面化して戻れなくなる現象を防ぐため、標準ブラウザへ強制ジャンプさせる処理 */
function handleLinkClick(e) {
  const target = e.target.closest("a");
  if (target) {
    const url = target.getAttribute("href");
    if (url && url.startsWith("http")) {
      e.preventDefault();
      e.stopPropagation();
      window.open(url, "_system"); // _systemや_blankで標準ブラウザ側へ完全に切り離す
    }
  }
}

function fixContentLinks() {
  const container = document.getElementById("content");
  if (!container) return;
  
  // クリックイベントリスナーを一元化して、既存・追加後のすべてのリンクを乗っ取る
  container.removeEventListener("click", handleLinkClick);
  container.addEventListener("click", handleLinkClick);

  const links = container.querySelectorAll("a");
  links.forEach(a => {
    a.setAttribute("target", "_blank");
    a.setAttribute("rel", "noopener noreferrer");
  });
}

async function showCleanFull(){
  if(!current.link){ alert("リンクがありません"); return; }
  
  const contentEl = document.getElementById("content");
  contentEl.innerHTML = `<h3>${applyHighlight(current.title)}</h3><div style="text-align:center; padding:40px 0; color:#aaa;">本文を読み込み中…</div>`;
  
  try {
    const proxy = "https://corsproxy.io/?" + encodeURIComponent(current.link);
    const htmlText = await fetchWithTimeout(proxy, 8000).then(r => r.text());
    
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlText, "text/html");
    
    // 不要タグの削除
    const removes = doc.querySelectorAll("script, style, noscript, iframe:not([src*='youtube']):not([src*='vimeo']), header, footer, nav, aside, .sidebar, #sidebar, .ads, .ad, [class*='ad-'], [id*='ad-'], .ch_ad, .ad_area");
    removes.forEach(el => el.remove());
    
    // 高精度セレクター群
    const mainSelectors = [
      ".ch_exp", ".enc_entry_body", "#entry_body", ".entry_body", ".entry-body", 
      "article", ".article", ".post-body", ".entry-content", "main"
    ];
    
    let bodyContainer = null;
    for (let selector of mainSelectors) {
      const found = doc.querySelector(selector);
      if (found && found.textContent.trim().length > 100) {
        bodyContainer = found;
        break;
      }
    }
    
    if (!bodyContainer) bodyContainer = doc.body;

    const targetNodes = bodyContainer.querySelectorAll("p, h1, h2, h3, h4, h5, h6, img, iframe[src*='youtube'], iframe[src*='vimeo'], div");
    let resultHTML = "";
    let addedTexts = new Set();
    
    targetNodes.forEach(node => {
      const tag = node.tagName.toLowerCase();
      
      if (tag === "img") {
        const src = node.getAttribute("src") || node.getAttribute("data-src") || node.getAttribute("data-lazy-src");
        if (src && !src.includes("avatar") && !src.includes("icon") && !src.includes("logo") && !src.includes("plugin")) {
          let absoluteSrc = src;
          if (!src.startsWith("http")) {
            try { absoluteSrc = new URL(src, current.link).href; } catch(e){}
          }
          if (!resultHTML.includes(absoluteSrc)) {
            resultHTML += `<img src="${absoluteSrc}" onclick="openImgModal('${absoluteSrc}')">`;
          }
        }
      } 
      else if (tag === "iframe") {
        const src = node.getAttribute("src");
        if (src && !resultHTML.includes(src)) {
          resultHTML += `<iframe src="${src}" allowfullscreen></iframe>`;
        }
      } 
      else if (tag === "div") {
        let hasDirectText = false;
        for (let child of node.childNodes) {
          if (child.nodeType === 3 && child.textContent.trim().length > 0) {
            hasDirectText = true; break;
          }
        }
        if (hasDirectText) {
          let innerHTML = node.innerHTML;
          const textClean = node.textContent.trim();
          if (textClean.length > 2 && !addedTexts.has(textClean)) {
            addedTexts.add(textClean);
            resultHTML += `<div>${applyHighlight(innerHTML)}</div>`;
          }
        }
      }
      else {
        let innerHTML = node.innerHTML;
        const textClean = node.textContent.trim();
        if (textClean.length > 0 && !addedTexts.has(textClean)) {
          addedTexts.add(textClean);
          resultHTML += `<${tag}>${applyHighlight(innerHTML)}</${tag}>`;
        }
      }
    });

    if (resultHTML.trim().length < 50) {
      resultHTML = bodyContainer.innerHTML
        .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
        .replace(/<style\b[^<]*(?:(?!<\/style>)<[^<]*)*<\/style>/gi, '');
    }

    contentEl.innerHTML = `
      <h3>${applyHighlight(current.title)}</h3>
      <div class="full-view-content">${resultHTML}</div>
    `;
    
    fixContentLinks();
    
  } catch(e) {
    contentEl.innerHTML = `<h3>${applyHighlight(current.title)}</h3><div style="text-align:center; padding:40px 0; color:#ff6b6b;">通信エラーまたは解析エラーが発生しました。</div>`;
  }
}

function showRawSite(){
  isFullView = true;
  if(!current.link){ alert("リンクがありません"); return; }
  const safe = current.link.replace(/"/g,"&quot;");
  const key = current.key;
  const isFav = !!favorites[key];

  document.getElementById("content").innerHTML = `
    <iframe src="${safe}" class="site-display-iframe"></iframe>
  `;
  
  document.getElementById("bottomBar").innerHTML = `

    <button class="btn" onclick="prevItem()">▲</button>
    <button class="btn" onclick="nextItem()">▼</button>
  `;
}

function toggleFavoriteCurrent(){
  const key = current.key;
  if (favorites[key]) { favorites[key] = false; delete favArticles[key]; }
  else { favorites[key] = true; favArticles[key] = current; }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  localStorage.setItem("favArticles", JSON.stringify(favArticles));

function toggleFavoriteFilter(){
  favoriteOnly = !favoriteOnly;
  const btn = document.getElementById("favFilterBtn");
  if(favoriteOnly) btn.classList.add("active");
  else btn.classList.remove("active");
  render();
}

/* 画像モーダル */
let imgScale = 1, imgLastDist = 0, imgTranslateX = 0, imgTranslateY = 0, imgLastX = 0, imgLastY = 0, imgDragging = false;
function applyImgTransform(){
  document.getElementById("imgModalImg").style.transform = `translate(${imgTranslateX}px,${imgTranslateY}px) scale(${imgScale})`;
}
function openImgModal(src){
  if(!src) return;
  const modal = document.getElementById("imgModal");
  const img = document.getElementById("imgModalImg");
  img.src = src;
  imgScale = 1; imgTranslateX = 0; imgTranslateY = 0; imgLastDist = 0;
  applyImgTransform();
  modal.style.display="flex";
}
document.getElementById("imgModal").onclick = (e)=>{ if(e.target.id === "imgModal") closeImgModal(); };
function closeImgModal(){ document.getElementById("imgModal").style.display="none"; }
document.getElementById("imgModal").addEventListener("touchstart", e=>{
  if(e.touches.length === 1){ imgDragging = true; imgLastX = e.touches[0].clientX; imgLastY = e.touches[0].clientY; }
});
document.getElementById("imgModal").addEventListener("touchmove", e=>{
  if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(imgLastDist){ imgScale *= dist / imgLastDist; imgScale = Math.max(1, Math.min(imgScale, 4)); applyImgTransform(); }
    imgLastDist = dist; imgDragging = false;
  } else if(e.touches.length === 1 && imgScale > 1 && imgDragging){
    const x = e.touches[0].clientX, y = e.touches[0].clientY;
    imgTranslateX += x - imgLastX; imgTranslateY += y - imgLastY;
    imgLastX = x; imgLastY = y;
    applyImgTransform();
  }
});
document.getElementById("imgModal").addEventListener("touchend", e=>{
  if(e.touches.length < 2) imgLastDist = 0;
  if(e.touches.length === 0) imgDragging = false;
});

function closeViewer(){
  document.getElementById("viewer").style.display="none";
  document.documentElement.style.overflow = ""; document.body.style.overflow = "";
}
function prevItem(){ if(currentViewIndex>0) openItem(currentViewIndex-1); }
function nextItem(){ if(currentViewIndex<currentView.length-1) openItem(currentViewIndex+1); }

/* 設定メニュー */
function toggleManager(){
  const m=document.getElementById("manager");
  const isOpen = m.style.display==="block";
  if(!isOpen){
    renderManager(); renderExcludeList(); renderHighlightList();
    document.documentElement.style.overflow="hidden"; document.body.style.overflow="hidden";
  }else{
    document.documentElement.style.overflow=""; document.body.style.overflow="";
  }
  m.style.display = isOpen ? "none" : "block";
}

function renderManager(){
  const wrap=document.getElementById("rssList"); wrap.innerHTML="";
  feeds.forEach((f,i)=>{
    const div=document.createElement("div"); div.className="rssItem";
    div.innerHTML=`<span>${f.name || f.url}</span><span><button onclick="editFeedName(${i})">✏️</button><button onclick="removeFeed(${i})">削除</button></span>`;
    wrap.appendChild(div);
  });
}
function removeFeed(i){
  const f = feeds[i];
  if(f && confirm(`「${f.name}」を削除しますか？蓄積データも削除されます。`)){
    if(dbArticles[f.url]) delete dbArticles[f.url];
    localStorage.setItem("dbArticles", JSON.stringify(dbArticles));
    
    feeds.splice(i,1); localStorage.setItem("feeds",JSON.stringify(feeds));
    if(String(i)===currentFeedFilter) currentFeedFilter="all";
    buildFeedSelect(); renderManager(); load();
  }
}

function addExcludeWord(){
  const v=document.getElementById("excludeInput").value.trim();
  if(!v || excludeWords.includes(v)) return;
  excludeWords.push(v); localStorage.setItem("excludeWords",JSON.stringify(excludeWords));
  document.getElementById("excludeInput").value=""; renderExcludeList(); render();
}
function removeExcludeWord(idx){ excludeWords.splice(idx,1); localStorage.setItem("excludeWords",JSON.stringify(excludeWords)); renderExcludeList(); render(); }
function renderExcludeList(){
  const wrap=document.getElementById("excludeList"); wrap.innerHTML="";
  excludeWords.forEach((w,i)=>{
    const div=document.createElement("div"); div.className="excludeItem";
    div.innerHTML=`<span>${w}</span><button onclick="removeExcludeWord(${i})">削除</button>`; wrap.appendChild(div);
  });
}

function addHighlightWord(){
  const v=document.getElementById("highlightInput").value.trim();
  if(!v || highlightWords.includes(v)) return;
  highlightWords.push(v); localStorage.setItem("highlightWords",JSON.stringify(highlightWords));
  document.getElementById("highlightInput").value=""; renderHighlightList(); render();
}
function removeHighlightWord(idx){ highlightWords.splice(idx,1); localStorage.setItem("highlightWords",JSON.stringify(highlightWords)); renderHighlightList(); render(); }
function renderHighlightList(){
  const wrap=document.getElementById("highlightList"); wrap.innerHTML="";
  highlightWords.forEach((w,i)=>{
    const div=document.createElement("div"); div.className="excludeItem";
    div.innerHTML=`<span>${w}</span><button onclick="removeHighlightWord(${i})">削除</button>`; wrap.appendChild(div);
  });
}

function resetRead(){ if(!confirm("既読データをすべてクリアしますか？")) return; readMap={}; localStorage.setItem("readMap",JSON.stringify(readMap)); render(); }

function resetAllArticlesData(){
  if(!confirm("これまでに蓄積した各ブログの過去ログ記事データをすべて削除して、現在の最新RSSから再取得しますか？\n（※お気に入りは消えません）")) return;
  dbArticles = {};
  localStorage.setItem("dbArticles", JSON.stringify(dbArticles));
  load();
}

function toggleUnread(){ unreadOnly=!unreadOnly; const btn=document.getElementById("unreadBtn"); if(unreadOnly) btn.classList.add("active"); else btn.classList.remove("active"); render(); }
function onFeedChange(){ currentFeedFilter=document.getElementById("feedSelect").value; render(); }
function buildFeedSelect(){
  const sel=document.getElementById("feedSelect"); sel.innerHTML=`<option value="all">全てのサイト</option>`;
  feeds.forEach((f,idx)=>{ const opt=document.createElement("option"); opt.value=String(idx); opt.textContent=f.name || f.url; sel.appendChild(opt); });
  if(currentFeedFilter!=="all" && !feeds[Number(currentFeedFilter)]) currentFeedFilter="all";
  sel.value=currentFeedFilter;
}

async function exportBackupClipboard(){
  try { await navigator.clipboard.writeText(JSON.stringify({feeds, excludeWords, highlightWords}, null, 2)); alert("コピーしました！"); } catch(e) { alert("コピーに失敗しました。"); }
}
async function importBackupClipboard(){
  try{
    const txt = await navigator.clipboard.readText(); if(!txt) return;
    const data = JSON.parse(txt); feeds = data.feeds || []; excludeWords = data.excludeWords || []; highlightWords = data.highlightWords || [];
    localStorage.setItem("feeds", JSON.stringify(feeds)); localStorage.setItem("excludeWords", JSON.stringify(excludeWords)); localStorage.setItem("highlightWords", JSON.stringify(highlightWords));
    buildFeedSelect(); renderManager(); load(); alert("インポートしました！");
  }catch(e){ alert("解析に失敗しました。"); }
}

/* Pull-to-refresh */
let startY=0, pulling=false, refreshReady=false;
function showLoading(on,text){ const el=document.getElementById("loading"); if(text) el.textContent=text; el.style.height = on ? "40px" : "0"; }
document.addEventListener("touchstart",e=>{
  if(document.getElementById("viewer").style.display==="block" || document.getElementById("manager").style.display==="block" || window.scrollY > 0) return;
  startY=e.touches[0].clientY; pulling=true; refreshReady=false;
});
document.addEventListener("touchmove",e=>{
  if(!pulling) return; const dy=e.touches[0].clientY-startY;
  if(dy>20 && dy<=60) showLoading(true,"引っ張って更新");
  else if(dy>60){ showLoading(true,"更新"); refreshReady=true; }
});
document.addEventListener("touchend",()=>{
  if(!pulling) return; pulling=false;
  if(refreshReady){ showLoading(true,"更新中…"); load().then(()=>{ showLoading(true,"更新完了"); setTimeout(()=>showLoading(false),500); }); }
  else showLoading(false);
});

/* 起動処理 */
window.onload=()=>{
  try{ feeds = JSON.parse(localStorage.getItem("feeds")) || []; }catch(e){}
  try{ readMap = JSON.parse(localStorage.getItem("readMap")) || {}; }catch(e){}
  try{ excludeWords = JSON.parse(localStorage.getItem("excludeWords")) || []; }catch(e){}
  try{ highlightWords = JSON.parse(localStorage.getItem("highlightWords")) || []; }catch(e){}
  try{ dbArticles = JSON.parse(localStorage.getItem("dbArticles")) || {}; }catch(e){}
  try{ 
    const rawFav = localStorage.getItem("favorites"), parsedFav = JSON.parse(rawFav) || {};
    if (typeof parsedFav === 'object') { for(let k in parsedFav) { favorites[k] = typeof parsedFav[k] === 'object' ? true : !!parsedFav[k]; } }
  }catch(e){}
  try{ favArticles = JSON.parse(localStorage.getItem("favArticles")) || {}; }catch(e){}
  buildFeedSelect();
  
  if(Object.keys(dbArticles).length > 0) {
    itemsByFeed = feeds.map(()=>[]);
    flatItems = [];
    feeds.forEach((f, fi)=>{
      itemsByFeed[fi] = dbArticles[f.url] || [];
      itemsByFeed[fi].forEach((item, idx) => { flatItems.push({feedIndex:fi,indexInFeed:idx,item:item}); });
    });
    flatItems.sort((a,b)=>(b.item.pubDate||0)-(a.item.pubDate||0));
    buildFeedSelect();
    render();
  }
  
  load();
};
</script>
