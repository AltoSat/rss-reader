<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>RSS Stable V49.2</title>

<style>
html,body{
  margin:0;
  font-family:-apple-system;
  background:#121212;
  color:#e0e0e0;
  touch-action:manipulation;
  overscroll-behavior-y:contain;
}

/* ====== ヘッダー ====== */
header{
  position:fixed;
  top:0;left:0;right:0;
  z-index:9999;
  background:#1e1e1e;
  padding:6px 8px;
  display:flex;
  gap:6px;
  align-items:center;
  height:48px;
  box-sizing:border-box;
}

#feedSelect{
  flex:1;
  padding:6px;
  background:#2a2a2a;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:14px;
}

#unreadBtn,#favFilterBtn,#manageBtn{
  width:36px;height:36px;
  padding:0;
  border:none;
  border-radius:8px;
  background:#2a2a2a;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

#unreadBtn{font-size:18px;}
#favFilterBtn{font-size:20px;}
#manageBtn{font-size:24px;}

#unreadBtn.active{background:#1976d2;}
#favFilterBtn.active{background:#fbc02d;color:#000;}

/* ====== プル更新 ====== */
#loading{
  position:fixed;
  top:48px;left:0;right:0;
  text-align:center;
  height:0;
  overflow:hidden;
  background:#1e1e1e;
  color:#aaa;
  transition:0.2s;
  line-height:40px;
}

/* ====== 一覧 ====== */
#list{
  margin-top:48px;
  padding:8px 10px;
}

.item{
  background:#1e1e1e;
  margin:8px 0;
  padding:12px;
  border-radius:10px;
  position:relative;
  overflow:hidden;
}

.item.read{opacity:0.4;}
.item.favorite{border:1px solid #fbc02d;}

.item::after{
  content:"★";
  position:absolute;
  right:10px;top:50%;
  transform:translateY(-50%);
  color:#fbc02d;
  opacity:0;
  transition:0.2s;
}
.item.swiping-left::after{opacity:1;}

/* ====== viewer ====== */
#viewer{
  position:fixed;
  inset:0;
  background:#121212;
  display:none;
  z-index:10000;
  overflow-y:auto;
}

#content{
  padding:12px;
  padding-bottom:120px;
}

#content img{
  max-width:100%;
  max-height:50vh;
  object-fit:contain;
  border-radius:8px;
  display:block;
  margin:10px auto;
  cursor:zoom-in;
}

#bottomBar{
  position:fixed;
  bottom:0;left:0;right:0;
  height:100px;
  background:#1e1e1e;
  display:flex;
}

.btn{
  flex:1;
  margin:6px;
  font-size:18px;
  background:#2a2a2a;
  color:#fff;
  border:none;
  border-radius:12px;
}

.btn-fav{
  flex:0 0 60px;
  max-width:60px;
}

/* ====== 画像モーダル ====== */
#imgModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  z-index:10001;
  align-items:center;
  justify-content:center;
}

#imgModalImg{
  max-width:100%;
  max-height:100%;
  touch-action:none;
  transition:transform 0.05s linear;
}

/* ====== 管理メニュー ====== */
#manager{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:#121212;
  display:none;
  z-index:10002;
  padding:10px;
  overflow-y:auto;
  padding-bottom:200px;
}

#managerClose{
  position:absolute;
  top:8px;right:8px;
  width:32px;height:32px;
  border:none;
  border-radius:8px;
  background:#2a2a2a;
  color:#fff;
  font-size:18px;
}

.manager-section{margin-bottom:16px;}
.manager-section h4{margin:0 0 6px;}

.rssItem{
  background:#1e1e1e;
  padding:6px 8px;
  margin:4px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#excludeList,#highlightList{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.excludeItem{
  background:#1e1e1e;
  padding:6px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#excludeInput,#rssInput,#highlightInput,#backupArea{
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#2a2a2a;
  color:#fff;
  box-sizing:border-box;
  margin-bottom:6px;
}

.highlight{
  background:#ffeb3b;
  color:#000;
  font-weight:bold;
  padding:2px 4px;
  border-radius:4px;
}

#content a{
  color:#4da3ff !important;
  text-decoration:underline;
}
</style>
</head>

<body>

<header>
  <select id="feedSelect" onchange="onFeedChange()">
    <option value="all">全てのサイト</option>
  </select>
  <button id="unreadBtn" onclick="toggleUnread()">未</button>
  <button id="favFilterBtn" onclick="toggleFavoriteFilter()">★</button>
  <button id="manageBtn" onclick="toggleManager()">≡</button>
</header>

<div id="loading">更新</div>
<div id="list"></div>

<div id="viewer">
  <div id="content"></div>
  <div id="bottomBar"></div>
</div>

<div id="imgModal">
  <img id="imgModalImg" src="">
</div>

<div id="manager">
  <button id="managerClose" onclick="toggleManager()">×</button>

  <h3>管理メニュー</h3>

  <div class="manager-section">
    <h4>RSSを追加</h4>
    <input id="rssInput" placeholder="RSS URL を入力"
           onkeydown="if(event.key==='Enter'){addRSS()}">
  </div>

  <div class="manager-section">
    <h4>登録済みRSS</h4>
    <div id="rssList"></div>
  </div>

  <div class="manager-section">
    <h4>除外ワード</h4>
    <input id="excludeInput" placeholder="除外ワードを入力">
    <div id="excludeList"></div>
  </div>

  <div class="manager-section">
    <h4>強調ワード</h4>
    <input id="highlightInput" placeholder="強調ワードを入力">
    <div id="highlightList"></div>
  </div>

  <div class="manager-section">
    <h4>バックアップ / インポート</h4>
    <textarea id="backupArea" rows="6"
      placeholder="ここにバックアップJSONを表示 / 貼り付け"></textarea>
    <button onclick="exportBackup()">バックアップを生成</button>
    <button onclick="importBackup()">インポートして反映</button>
  </div>

  <button onclick="resetRead()">既読情報を削除</button>
</div>

<script>
/* =========================
   状態管理
========================= */
let feeds = [];
let itemsByFeed = [];
let flatItems = [];
let currentView = [];
let currentViewIndex = 0;
let current = null;

let readMap = {};
let excludeWords = [];
let highlightWords = [];
let favorites = {};
let favoriteOnly = false;

let currentFeedFilter = "all";
let unreadOnly = false;

/* ★ 全文表示中かどうか */
let isFullView = false;

/* ★ 背景スクロール固定用 */
let lockScrollY = 0;

/* =========================
   fetch with timeout
========================= */
async function fetchWithTimeout(url, timeout=10000){
  return Promise.race([
    fetch(url),
    new Promise((_,reject)=>setTimeout(()=>reject("timeout"),timeout))
  ]);
}

/* =========================
   HTMLエンティティをデコード
========================= */
function decodeHtmlEntities(str){
  if(!str) return "";
  const txt = document.createElement("textarea");
  txt.innerHTML = str;
  return txt.value;
}

/* =========================
   content:encoded の取得
========================= */
function getNodeHTML(node){
  const el =
    node.querySelector("content") ||
    node.querySelector("content\\:encoded") ||
    node.getElementsByTagNameNS("*","encoded")[0];

  if(!el) return "";

  let html = el.textContent || "";
  return decodeHtmlEntities(html);
}

/* =========================
   画像抽出
========================= */
function extractImages(html){
  if(!html) return [];
  const decoded = decodeHtmlEntities(html);
  const urls = [...decoded.matchAll(/<img[^>]+src=["']([^"']+)["']/gi)]
    .map(m => m[1]);
  return [...new Set(urls)];
}

/* 本文から画像タグを除去 */
function stripImages(html){
  if(!html) return "";
  const decoded = decodeHtmlEntities(html);
  return decoded.replace(/<img[^>]*>/gi, "");
}

/* 記事画像抽出 */
function getArticleImage(node){
  let candidates = [];

  const desc = node.querySelector("description")?.textContent || "";
  candidates.push(...extractImages(desc));

  const contentHtml = getNodeHTML(node);
  candidates.push(...extractImages(contentHtml));

  const media = node.querySelector("media\\:content")?.getAttribute("url");
  if(media) candidates.push(media);

  const enc = node.querySelector("enclosure")?.getAttribute("url");
  if(enc) candidates.push(enc);

  const unique = [...new Set(candidates)];
  return unique.length > 0 ? unique[0] : "";
}

/* =========================
   強調ワード適用
========================= */
function applyHighlight(text){
  if(!text) return "";
  let result = text;
  highlightWords.forEach(w=>{
    if(!w) return;
    const re = new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "gi");
    result = result.replace(re, `<span class="highlight">$&</span>`);
  });
  return result;
}

/* =========================
   RSS追加
========================= */
async function addRSS(){
  const rssUrl = document.getElementById("rssInput").value.trim();
  if(!rssUrl) return;
  if(!rssUrl.startsWith("http")) return;
  if(feeds.some(f => f.url === rssUrl)) return;

  let blogName = rssUrl;
  try{
    const proxy = "https://corsproxy.io/?" + encodeURIComponent(rssUrl);
    const xmlText = await fetch(proxy).then(r=>r.text());
    const xml = new DOMParser().parseFromString(xmlText,"text/xml");
    const titleNode = xml.querySelector("channel > title, feed > title");
    if(titleNode) blogName = titleNode.textContent.trim();
  }catch(e){}

  feeds.push({url:rssUrl,name:blogName});
  localStorage.setItem("feeds", JSON.stringify(feeds));

  document.getElementById("rssInput").value = "";

  buildFeedSelect();
  renderManager();
  load();
}

/* =========================
   RSS名編集
========================= */
function editFeedName(i){
  const f = feeds[i];
  const currentName = f.name || f.url;
  const name = prompt("ブログ名を編集", currentName);
  if(name === null) return;
  const trimmed = name.trim();
  if(!trimmed) return;

  feeds[i].name = trimmed;
  localStorage.setItem("feeds", JSON.stringify(feeds));

  buildFeedSelect();
  renderManager();
}

/* =========================
   ページングURL生成
========================= */
function buildPagedUrls(baseUrl){
  const urls = [baseUrl];

  if(baseUrl.includes("blogspot.")){
    urls.push(baseUrl + "?start-index=11&max-results=10");
    urls.push(baseUrl + "?start-index=21&max-results=10");
    return urls;
  }

  if(baseUrl.includes("hatenablog")){
    urls.push(baseUrl + "?page=2");
    urls.push(baseUrl + "?page=3");
    return urls;
  }

  if(baseUrl.includes("livedoor.jp")){
    urls.push(baseUrl + "?page=2");
    urls.push(baseUrl + "?page=3");
    return urls;
  }

  if(baseUrl.includes("/feed") || baseUrl.includes("/rss") || baseUrl.includes("/atom")){
    urls.push(baseUrl + "?paged=2");
    urls.push(baseUrl + "?paged=3");
    return urls;
  }

  return urls;
}

/* =========================
   RSS解析（重複排除）
========================= */
let seenKeys = new Set();

function makeItemKey(title, link, desc, pub){
  if(link) return link;
  if(title && pub) return title + "|" + pub;
  return title + "|" + desc.slice(0,50);
}

function parseRSS(text, fi){
  const xml = new DOMParser().parseFromString(text,"text/xml");
  const root = xml.documentElement.tagName.toLowerCase();

  const pushItem = (title, desc, link, img, pubMs)=>{
    const key = makeItemKey(title, link, desc, pubMs);
    if(seenKeys.has(key)) return;
    seenKeys.add(key);

    itemsByFeed[fi].push({title,desc,link,image:img,pubDate:pubMs,key});
  };

  if(root==="rss"){
    const items = xml.getElementsByTagName("item");
    for(const node of items){
      const rawDesc = getNodeHTML(node)
                   || node.querySelector("description")?.textContent
                   || "";
      const desc = stripImages(rawDesc);
      const link = node.querySelector("link")?.textContent || "";
      const title = node.querySelector("title")?.textContent || "";
      const img = getArticleImage(node);

      let pubMs = 0;
      const pub = node.querySelector("pubDate")?.textContent;
      if(pub){
        const t = Date.parse(pub);
        if(!isNaN(t)) pubMs = t;
      }

      pushItem(title, desc, link, img, pubMs);
    }
  }
  else if(root==="feed"){
    const entries = xml.getElementsByTagName("entry");
    for(const node of entries){
      const title = node.getElementsByTagName("title")[0]?.textContent || "";

      const rawDesc = getNodeHTML(node)
                   || node.getElementsByTagName("summary")[0]?.textContent
                   || "";
      const desc = stripImages(rawDesc);

      const linkNode = [...node.getElementsByTagName("link")]
        .find(l=>l.getAttribute("rel")==="alternate")
        || node.getElementsByTagName("link")[0];
      const link = linkNode?.getAttribute("href") || "";

      const img = getArticleImage(node);

      let pubMs = 0;
      const upd = node.getElementsByTagName("updated")[0]?.textContent ||
                  node.getElementsByTagName("published")[0]?.textContent;
      if(upd){
        const t = Date.parse(upd);
        if(!isNaN(t)) pubMs = t;
      }

      pushItem(title, desc, link, img, pubMs);
    }
  }
  else if(root.includes("rdf")){
    const items = xml.getElementsByTagName("item");
    for(const node of items){
      const rawDesc = getNodeHTML(node)
                   || node.getElementsByTagName("description")[0]?.textContent
                   || "";
      const desc = stripImages(rawDesc);
      const title = node.getElementsByTagName("title")[0]?.textContent || "";
      const link = node.getElementsByTagName("link")[0]?.textContent || "";
      const img = getArticleImage(node);

      pushItem(title, desc, link, img, 0);
    }
  }
}

/* =========================
   RSS読み込み（過去ページ対応）
========================= */
async function load(){
  itemsByFeed = feeds.map(()=>[]);
  flatItems = [];
  currentView = [];
  seenKeys = new Set();

  for(let fi=0; fi<feeds.length; fi++){
    const f = feeds[fi];
    const pageUrls = buildPagedUrls(f.url);

    for(const pageUrl of pageUrls){
      try{
        const proxy = "https://corsproxy.io/?" + encodeURIComponent(pageUrl);
        const res = await fetchWithTimeout(proxy,10000);
        const text = await res.text();
        parseRSS(text, fi);
      }catch(e){
        console.log("ページ取得失敗:", pageUrl, e);
      }
    }
  }

  for(let fi=0; fi<itemsByFeed.length; fi++){
    itemsByFeed[fi].sort((a,b)=>(b.pubDate||0)-(a.pubDate||0));
  }

  flatItems=[];
  for(let fi=0; fi<itemsByFeed.length; fi++){
    const arr = itemsByFeed[fi];
    for(let idx=0; idx<arr.length; idx++){
      flatItems.push({feedIndex:fi,indexInFeed:idx,item:arr[idx]});
    }
  }
  flatItems.sort((a,b)=>(b.item.pubDate||0)-(a.item.pubDate||0));

  render();
}

/* =========================
   除外ワード判定
========================= */
function isExcluded(item){
  const t = (item.title||"").toLowerCase();
  const d = (item.desc||"").toLowerCase();
  return excludeWords.some(w=>{
    const s = w.toLowerCase().trim();
    return s && (t.includes(s) || d.includes(s));
  });
}

/* =========================
   一覧描画
========================= */
function render(){
  const list = document.getElementById("list");
  list.innerHTML="";
  currentView=[];

  let source=[];
  if(currentFeedFilter==="all"){
    source=flatItems;
  }else{
    const fi = Number(currentFeedFilter);
    const arr = itemsByFeed[fi] || [];
    source = arr.map((it,idx)=>({feedIndex:fi,indexInFeed:idx,item:it}));
  }

  source.forEach(ref=>{
    const it = ref.item;
    if(isExcluded(it)) return;

    const key = it.key;
    const isRead = !!readMap[key];
    const isFav = !!favorites[key];

    if(unreadOnly && isRead) return;
    if(favoriteOnly && !isFav) return;

    const viewIndex = currentView.length;
    currentView.push(ref);

    const div = document.createElement("div");
    div.className="item";
    if(isRead) div.classList.add("read");
    if(isFav) div.classList.add("favorite");

    div.dataset.key = key;
    div.innerHTML = applyHighlight(it.title || "(無題)");

    addSwipeHandler(div, key);

    div.onclick = ()=>openItem(viewIndex);
    list.appendChild(div);
  });
}

/* =========================
   スワイプでお気に入り追加
========================= */
function addSwipeHandler(el, key){
  let startX=0, startY=0, moved=false;

  el.addEventListener("touchstart",e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
  });

  el.addEventListener("touchmove",e=>{
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    if(Math.abs(dy) > 30) return;

    if(dx < -40){
      el.classList.add("swiping-left");
      moved = true;
    }
  });

  el.addEventListener("touchend",()=>{
    if(moved){
      favorites[key] = true;
      localStorage.setItem("favorites", JSON.stringify(favorites));
      render();
    }
    el.classList.remove("swiping-left");
  });
}

/* =========================
   記事を開く（scroll-lock 完全版）
========================= */
function openItem(viewIndex){
  if(viewIndex<0 || viewIndex>=currentView.length) return;

  currentViewIndex=viewIndex;
  const ref = currentView[viewIndex];
  current = itemsByFeed[ref.feedIndex][ref.indexInFeed];

  const key = current.key;
  readMap[key]=true;
  localStorage.setItem("readMap",JSON.stringify(readMap));

  render();

  /* ★ スクロール位置を完全固定 */
  lockScrollY = window.scrollY || 0;
  document.documentElement.style.overflow = "hidden";
  document.body.style.overflow = "hidden";
  window.scrollTo(0, lockScrollY);

  document.getElementById("viewer").style.display="block";
  renderViewer();
}

/* ★ 背景スクロールを常に元の位置に戻す */
window.addEventListener("scroll", ()=>{
  if(document.getElementById("viewer").style.display === "block"){
    if(window.scrollY !== lockScrollY){
      window.scrollTo(0, lockScrollY);
    }
  }
});

/* =========================
   プレビュー
========================= */
function renderViewer(){
  isFullView = false;

  const key = current.key;
  const isFav = !!favorites[key];

  const imgHtml = current.image
    ? `<img src="${current.image}" onclick="openImgModal('${current.image}')">`
    : "";

  document.getElementById("content").innerHTML = `
    <h3>${applyHighlight(current.title)}</h3>
    ${imgHtml}
    <div>${applyHighlight(current.desc)}</div>

    <button class="btn" onclick="showFull()" style="margin-top:10px;">
      全文表示
    </button>
  `;

  document.getElementById("bottomBar").innerHTML = `
    <button class="btn" onclick="closeViewer()">戻る</button>
    <button class="btn-fav btn" onclick="toggleFavoriteCurrent()">${isFav?"★":"☆"}</button>
    <button class="btn" onclick="prevItem()">▲</button>
    <button class="btn" onclick="nextItem()">▼</button>
  `;
}

/* =========================
   全文表示
========================= */
function showFull(){
  isFullView = true;

  if(!current.link){
    alert("リンクがありません");
    return;
  }

  const safe = current.link.replace(/"/g,"&quot;");
  const key = current.key;
  const isFav = !!favorites[key];

  document.getElementById("content").innerHTML = `
    <iframe src="${safe}" style="width:100%;height:80vh;border:none;"></iframe>
  `;

  document.getElementById("bottomBar").innerHTML = `
    <button class="btn" onclick="renderViewer()">戻る</button>
    <button class="btn-fav btn" onclick="toggleFavoriteCurrent()">${isFav?"★":"☆"}</button>
    <button class="btn" onclick="prevItem()">▲</button>
    <button class="btn" onclick="nextItem()">▼</button>
  `;
}

/* =========================
   ★ お気に入り切替（全文表示対応）
========================= */
function toggleFavoriteCurrent(){
  const key = current.key;
  favorites[key] = !favorites[key];
  localStorage.setItem("favorites", JSON.stringify(favorites));

  if(isFullView){
    /* ★ 全文表示中 → 画面はそのまま、★だけ更新 */
    const isFav = favorites[key];
    document.querySelector(".btn-fav").textContent = isFav ? "★" : "☆";
  }else{
    /* ★ プレビュー中 → 再描画 */
    renderViewer();
  }

  /* 一覧の★状態は常に更新 */
  render();
}

/* =========================
   画像モーダル（ピンチズーム + ドラッグ）
========================= */
let imgScale = 1;
let imgLastDist = 0;
let imgTranslateX = 0;
let imgTranslateY = 0;
let imgLastX = 0;
let imgLastY = 0;
let imgDragging = false;

function applyImgTransform(){
  const img = document.getElementById("imgModalImg");
  img.style.transform =
    `translate(${imgTranslateX}px,${imgTranslateY}px) scale(${imgScale})`;
}

function openImgModal(src){
  const modal = document.getElementById("imgModal");
  const img = document.getElementById("imgModalImg");

  img.src = src;
  imgScale = 1;
  imgTranslateX = 0;
  imgTranslateY = 0;
  imgLastDist = 0;

  applyImgTransform();
  modal.style.display="flex";
}

/* 背景タップで閉じる */
document.getElementById("imgModal").onclick = (e)=>{
  if(e.target.id === "imgModal"){
    closeImgModal();
  }
};

function closeImgModal(){
  document.getElementById("imgModal").style.display="none";
}

/* ピンチズーム + ドラッグ */
document.getElementById("imgModal").addEventListener("touchstart", e=>{
  if(e.touches.length === 1){
    imgDragging = true;
    imgLastX = e.touches[0].clientX;
    imgLastY = e.touches[0].clientY;
  }
});

document.getElementById("imgModal").addEventListener("touchmove", e=>{
  const img = document.getElementById("imgModalImg");

  if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if(imgLastDist){
      imgScale *= dist / imgLastDist;
      imgScale = Math.max(1, Math.min(imgScale, 4));
      applyImgTransform();
    }
    imgLastDist = dist;
    imgDragging = false;
  }
  else if(e.touches.length === 1 && imgScale > 1){
    if(!imgDragging) return;

    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;

    imgTranslateX += x - imgLastX;
    imgTranslateY += y - imgLastY;

    imgLastX = x;
    imgLastY = y;

    applyImgTransform();
  }
});

document.getElementById("imgModal").addEventListener("touchend", e=>{
  if(e.touches.length < 2){
    imgLastDist = 0;
  }
  if(e.touches.length === 0){
    imgDragging = false;
  }
});

/* =========================
   viewer閉じる
========================= */
function closeViewer(){
  document.getElementById("viewer").style.display="none";
  document.documentElement.style.overflow = "";
  document.body.style.overflow = "";
}

/* =========================
   上下移動
========================= */
function prevItem(){
  if(currentViewIndex>0) openItem(currentViewIndex-1);
}
function nextItem(){
  if(currentViewIndex<currentView.length-1) openItem(currentViewIndex+1);
}

/* =========================
   管理メニュー
========================= */
function toggleManager(){
  const m=document.getElementById("manager");
  const isOpen = m.style.display==="block";

  if(!isOpen){
    renderManager();
    renderExcludeList();
    renderHighlightList();
    document.documentElement.style.overflow="hidden";
    document.body.style.overflow="hidden";
  }else{
    document.documentElement.style.overflow="";
    document.body.style.overflow="";
  }

  m.style.display = isOpen ? "none" : "block";
}

function renderManager(){
  const wrap=document.getElementById("rssList");
  wrap.innerHTML="";
  feeds.forEach((f,i)=>{
    const div=document.createElement("div");
    div.className="rssItem";
    div.innerHTML=`
      <span>${f.name || f.url}</span>
      <span>
        <button onclick="editFeedName(${i})">✏️</button>
        <button onclick="removeFeed(${i})">削除</button>
      </span>
    `;
    wrap.appendChild(div);
  });
}

function removeFeed(i){
  feeds.splice(i,1);
  localStorage.setItem("feeds",JSON.stringify(feeds));
  if(String(i)===currentFeedFilter) currentFeedFilter="all";
  buildFeedSelect();
  renderManager();
  load();
}

/* =========================

========================= */

  excludeWords.push(v);

  document.getElementById("excludeInput").value="";

}

function removeExcludeWord(idx){

function renderExcludeList(){

   既読情報削除
========================= */
function resetRead(){

  localStorage.setItem("readMap",JSON.stringify(readMap));
  render();
}

/* =========================
   未読ボタン
========================= */
function toggleUnread(){
  unreadOnly=!unreadOnly;
  const btn=document.getElementById("unreadBtn");
  if(unreadOnly) btn.classList.add("active");
  else btn.classList.remove("active");
  render();

/* =========================
   フィード切り替え
========================= */
function onFeedChange(){
  currentFeedFilter=document.getElementById("feedSelect").value;
  render();
}

/* =========================
   フィード選択肢
========================= */
function buildFeedSelect(){
  const sel=document.getElementById("feedSelect");
  sel.innerHTML=`<option value="all">全てのサイト</option>`;

  feeds.forEach((f,idx)=>{
    const opt=document.createElement("option");
    opt.value=String(idx);
    opt.textContent=f.name || f.url;
    sel.appendChild(opt);
  });

  if(currentFeedFilter!=="all" && !feeds[Number(currentFeedFilter)]){
    currentFeedFilter="all";
  }

  sel.value=currentFeedFilter;
}

/* =========================
   バックアップ / インポート
========================= */
function exportBackup(){
  const data = {
    feeds,
    readMap,
    excludeWords,
    highlightWords,
    favorites
  };

  document.getElementById("backupArea").value =
    JSON.stringify(data, null, 2);
}

function importBackup(){
  try{
    const txt = document.getElementById("backupArea").value;
    const data = JSON.parse(txt);

    feeds = data.feeds || [];
    readMap = data.readMap || {};
    excludeWords = data.excludeWords || [];
    highlightWords = data.highlightWords || [];
    favorites = data.favorites || {};

    localStorage.setItem("feeds", JSON.stringify(feeds));
    localStorage.setItem("readMap", JSON.stringify(readMap));
    localStorage.setItem("excludeWords", JSON.stringify(excludeWords));
    localStorage.setItem("highlightWords", JSON.stringify(highlightWords));
    localStorage.setItem("favorites", JSON.stringify(favorites));

    buildFeedSelect();
    renderManager();
    load();

    alert("インポート完了");
  }catch(e){
    alert("JSON が不正です");
  }
}

/* =========================
   Pull-to-refresh
========================= */
let startY=0;
let pulling=false;
let refreshReady=false;

function showLoading(on,text){
  const el=document.getElementById("loading");
  if(text) el.textContent=text;
  el.style.height = on ? "40px" : "0";
}

document.addEventListener("touchstart",e=>{
  if(document.getElementById("viewer").style.display==="block") return;
  if(document.getElementById("manager").style.display==="block") return;
  if(window.scrollY > 0) return;

  startY=e.touches[0].clientY;
  pulling=true;
  refreshReady=false;
});

document.addEventListener("touchmove",e=>{
  if(!pulling) return;

  const dy=e.touches[0].clientY-startY;

  if(dy>20 && dy<=60){
    showLoading(true,"引っ張って更新");
  }else if(dy>60){
    showLoading(true,"更新");
    refreshReady=true;
  }
});

document.addEventListener("touchend",()=>{
  if(!pulling) return;

  pulling=false;

  if(refreshReady){
    showLoading(true,"更新中…");

    load().then(()=>{
      showLoading(true,"更新完了");
      setTimeout(()=>showLoading(false),500);
    });
  }else{
    showLoading(false);
  }
});

/* =========================
   起動処理
========================= */
window.onload=()=>{
  try{ feeds = JSON.parse(localStorage.getItem("feeds")) || []; }catch(e){}
  try{ readMap = JSON.parse(localStorage.getItem("readMap")) || {}; }catch(e){}
  try{ excludeWords = JSON.parse(localStorage.getItem("excludeWords")) || []; }catch(e){}
  try{ highlightWords = JSON.parse(localStorage.getItem("highlightWords")) || []; }catch(e){}
  try{ favorites = JSON.parse(localStorage.getItem("favorites")) || {}; }catch(e){}

  buildFeedSelect();
  load();
};
